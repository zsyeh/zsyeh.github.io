name: Sync Halo and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [halo-published]
  issues:
    types: [opened, edited, labeled, unlabeled, reopened, closed]
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: halo-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Route Halo API traffic to the origin
        run: echo "98.142.241.45 dxlab.ehzsy.space" | sudo tee -a /etc/hosts
      - name: Import published GitHub Issue
        if: github.event_name == 'issues'
        run: npm run issue:sync
      - name: Synchronize GitHub and Halo
        env:
          HALO_URL: https://dxlab.ehzsy.space
          HALO_TOKEN: ${{ secrets.HALO_TOKEN }}
          REQUIRE_HALO_TOKEN: "1"
        run: npm run sync:bidirectional
      - name: Save synchronized content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .halo-sync.json .sync src/content/blog public/halo-assets
          git diff --cached --quiet || git commit -m "content: sync Halo posts"
          git push
      - name: Build Astro
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
